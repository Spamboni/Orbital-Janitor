<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Orbital Janitor</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<canvas id="canvas"></canvas>

<!-- HUD overlay -->
<div id="hud-overlay">
  <div id="title">ORBITAL JANITOR</div>
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="score">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">HITS</span>
      <span class="hud-value" id="collisions">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span class="hud-value" id="level">1</span>
    </div>
    <button id="btn-reset" title="Reset">⟳</button>
    <button id="btn-settings" title="Settings">⚙</button>
  </div>
</div>

<!-- Settings panel -->
<div id="settings-panel">
  <div class="settings-title">PHYSICS SETTINGS</div>

  <div class="setting-row">
    <div class="setting-label">
      <span>VELOCITY</span>
      <span class="setting-val" id="val-velocity">100%</span>
    </div>
    <input type="range" id="slider-velocity" min="1.0" max="3.0" step="0.05" value="1.0">
  </div>

  <div class="setting-row">
    <div class="setting-label">
      <span>BOUNCINESS</span>
      <span class="setting-val" id="val-bounce">100%</span>
    </div>
    <input type="range" id="slider-bounce" min="0.3" max="2.0" step="0.05" value="1.0">
  </div>

  <div class="setting-row">
    <div class="setting-label">
      <span>GRAVITY</span>
      <span class="setting-val" id="val-gravity">100%</span>
    </div>
    <input type="range" id="slider-gravity" min="0.3" max="2.0" step="0.05" value="1.0">
  </div>

  <button class="settings-reset-btn" onclick="
    document.getElementById('slider-velocity').value = 1.0;
    document.getElementById('slider-bounce').value   = 1.0;
    document.getElementById('slider-gravity').value  = 1.0;
    if(window.Settings){ Settings.velocityMult=1; Settings.bounceMult=1; Settings.gravityMult=1; }
    document.getElementById('val-velocity').textContent = '100%';
    document.getElementById('val-bounce').textContent   = '100%';
    document.getElementById('val-gravity').textContent  = '100%';
  ">RESET DEFAULTS</button>
</div>

<!-- Win overlay -->
<div id="message-overlay">
  <div id="message-text">DEBRIS CLEARED!</div>
  <div id="message-sub"></div>
</div>

<script src="js/sound.js"></script>
<script src="js/physics.js"></script>
<script src="js/objects.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', function() {
    document.body.addEventListener('touchstart', function unlock() {
      if (window.Sound) Sound.getCtx();
      document.body.removeEventListener('touchstart', unlock);
    }, { once: true });
    window._game = new Game(document.getElementById('canvas'));
  });
</script>
</body>
</html>
