<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Orbital Janitor</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- HUD overlaid on top of canvas -->
<div id="hud-overlay">
  <div id="title">ORBITAL JANITOR</div>
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="score">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">HITS</span>
      <span class="hud-value" id="collisions">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span class="hud-value" id="level">1</span>
    </div>
    <button id="btn-reset">⟳</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<!-- Win overlay -->
<div id="message-overlay">
  <div id="message-text">DEBRIS CLEARED!</div>
  <div id="message-sub"></div>
</div>

<!-- Hint bar at very bottom -->
<div id="hint">Pull DOWN below a ball to aim · Release to launch</div>

<script src="js/sound.js"></script>
<script src="js/physics.js"></script>
<script src="js/objects.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', function() {
    // Unlock AudioContext on first touch (required by mobile browsers)
    document.body.addEventListener('touchstart', function unlock() {
      if (window.Sound) Sound.getCtx();
      document.body.removeEventListener('touchstart', unlock);
    }, { once: true });
    window._game = new Game(document.getElementById('canvas'));
  });
</script>
</body>
</html>
